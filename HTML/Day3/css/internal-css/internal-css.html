<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            color: rgba(25, 18, 218, 0.966);
            background-color: yellow;
        }

        ol li{
            color: red;
            background-color: lightblue;
            font-size: 20px;
        }

        .css-def{
            color: green;
            background-color: lightgray;
            font-size: 20px;
        }

        .css{
            color: blue;
            background-color: lightyellow;
        }

        #heading-1{
            color: red;
            background-color: lightgreen;
        }

        #h-1{
            color: blue;
            background-color: lightpink;
        }
    </style>
</head>
<body>
    <p>
        Lorem ipsum dolor, sit amet consectetur adipisicing elit. Minus.
    </p>

    <ul>
        <li>list 1</li>
        <li>list 2</li>
        <li>list 3</li>
    </ul>

    <ol>
        <li>list 1</li>
        <li>list 2</li>
        <li>list 3</li>
    </ol>

    <p>
        <h1 id="h-1">CSS</h1>
        <p class="css-def css">CSS is used to style the contents of the webpage defined in HTML</p>
    </p>
</body>
</html>
